                                <button onclick="modificaPunti(${i}, 'meno')" style="background: #dc3545; color: white; border: none; padding: 0.8vh 0; width: 4.5vw; min-width: 50px; cursor: pointer; font-size: clamp(18px, 1.8vw, 35px); font-weight: bold; border-radius: 8px;">-</button>

<div style="background: #1a1a1a; border: 0.3vw solid #ffcc00; border-radius: 1vw; padding: 1.5vw; flex-grow: 1; font-family: sans-serif; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; margin-right: 2vw;">

            <tbody>
                <script>
                    for(let i=1; i<=7; i++) {
                        document.write(`
                            <tr style="border-bottom: 1px solid #333;">

                                    <input type="text" id="nomeS${i}" oninput="salvaNomi()" placeholder="Nome..." style="width: 95%; background: #222; color: white; border: 1px solid #444; padding: 0.8vh; font-weight: 900; border-radius: 0.3vw; font-size: clamp(18px, 1.6vw, 36px);">
                                </td>
                                <td id="puntiS${i}" style="text-align: center; font-weight: bold; color: #ffcc00; font-size: clamp(30px, 3.2vw, 65px); line-height: 1.2;">0</td>
                                <td style="text-align: center;">
                                    <input type="number" id="valS${i}" value="100" style="width: 70%; max-width: 100px; font-size: clamp(16px, 1.2vw, 26px); text-align: center; padding: 0.5vh; border-radius: 0.3vw; border: 1px solid #444; background: white; color: black;">
                                </td>
                                <td style="text-align: center;">
                                    <span onclick="this.style.opacity='0.2'; this.style.filter='grayscale(1) shadow(0 0 0 transparent)';"

                                        ⚠️
                                    </span>
                                </td>
                                <td style="text-align: right; padding: 1vh 1vw 1vh 0;">

</div>

<script>
    // 1. Array modificato: Aggiunte le proprietà 'isTrappola' e 'testo'
    const datiGiochi = [
        // RIGA 1 (isTrappola: true = Rossa fissa, false = Verde fissa)
        { img: 'immagini/nier.png', isTrappola: true, testo: 'NON PERVENUTO DIO FATTUCCHIERE' },
        { img: 'immagini/b2.png', isTrappola: false,  testo: 'POSIZIONE N°100!' }, 
        { img: 'immagini/pac.png', isTrappola: false, testo: 'POSIZIONE N°53' },
        { img: 'immagini/lol.png', isTrappola: false, testo: 'POSIZIONE N°93' },
        { img: 'immagini/botw.png', isTrappola: false,  testo: 'POSIZIONE N°1' },
        
        // RIGA 2
        { img: 'immagini/m2.png', isTrappola: false, testo: 'POSIZIONE N°6' },
        { img: 'immagini/ff10.png', isTrappola: true,  testo: 'NON PERVENUTO MADONNA INCORONATA' },
        { img: 'immagini/bb.png', isTrappola: false, testo: 'POSIZIONE N°19' },
        { img: 'immagini/mhw.png', isTrappola: false, testo: 'POSIZIONE N°85' },
        { img: 'immagini/kh2.png', isTrappola: true,  testo: 'NON PERVENUTO GESU BEDUINO' },
        
        // RIGA 3
        { img: 'immagini/p5.png', isTrappola: false, testo: 'POSIZIONE N°81' },
        { img: 'immagini/ct.png', isTrappola: false, testo: 'POSIZIONE N°80' },
        { img: 'immagini/ac2.png', isTrappola: true,  testo: 'NON PERVENUTO!' },
        { img: 'immagini/fort.png', isTrappola: false, testo: 'POSIZIONE N°79' },
        { img: 'immagini/hades.png', isTrappola: false, testo: 'POSIZIONE N°13' },
        
        // RIGA 4
        { img: 'immagini/hk.png', isTrappola: false, testo: 'POSIZIONE N°54' },
        { img: 'immagini/terr.png', isTrappola: true,  testo: 'NON PERVENUTO GODO GODO GODO GODO GODO GODO GODO GODO' },
        { img: 'immagini/eb.png', isTrappola: false, testo: 'POSIZIONE N°50' },
        { img: 'immagini/smw.png', isTrappola: false, testo: 'POSIZIONE N°2' },
        { img: 'immagini/de.png', isTrappola: false, testo: 'POSIZIONE N°10' }
];

    datiGiochi.forEach((gioco) => {
    const slot = document.createElement('div');
    slot.className = 'cd-slot';
    
    slot.style.backgroundImage = `url('${gioco.img}')`;
    slot.style.backgroundPosition = 'center';
    
    slot.onclick = function() {
        if (gioco.isTrappola) {
            this.classList.add('rosso');
        } else {
            this.classList.add('verde');
        }
        
        const testoChiaro = document.createElement('span');
        testoChiaro.innerText = gioco.testo;
        
        // Stile per far "bucare" l'opacità del verde/rosso
        testoChiaro.style.position = "relative";
        testoChiaro.style.zIndex = "10"; 
        testoChiaro.style.opacity = "1"; 
        
        this.appendChild(testoChiaro);
        this.style.pointerEvents = 'none';
    }; // <--- Chiude la funzione onclick

    griglia.appendChild(slot);
});

       // 1. Carica punti E nomi salvati (o array vuoti se è la prima volta)
let punteggi = JSON.parse(localStorage.getItem('puntiG')) || [0, 0, 0, 0];
let puntiSpettatori = JSON.parse(localStorage.getItem('puntiS')) || [0, 0, 0, 0, 0, 0, 0];
let nomiG = JSON.parse(localStorage.getItem('nomiG')) || ["", "", "", ""];
let nomiS = JSON.parse(localStorage.getItem('nomiS')) || ["", "", "", "", "", "", ""];

// 2. Carica tutto all'avvio
window.onload = function() {
    // Carica dati Giocatori
    for(let i=1; i<=4; i++) {
        if(document.getElementById('punti' + i)) document.getElementById('punti' + i).innerText = punteggi[i-1];
        if(document.getElementById('nomeG' + i)) document.getElementById('nomeG' + i).value = nomiG[i-1];
    }
    // Carica dati Spettatori
    for(let i=1; i<=7; i++) {
        if(document.getElementById('puntiS' + i)) document.getElementById('puntiS' + i).innerText = puntiSpettatori[i-1];
        if(document.getElementById('nomeS' + i)) document.getElementById('nomeS' + i).value = nomiS[i-1];
    }
};

// 3. Funzione per salvare i nomi (chiamata ogni volta che scrivi)
function salvaNomi() {
    for(let i=1; i<=4; i++) {
        nomiG[i-1] = document.getElementById('nomeG' + i).value;
    }
    for(let i=1; i<=7; i++) {
        nomiS[i-1] = document.getElementById('nomeS' + i).value;
    }
    localStorage.setItem('nomiG', JSON.stringify(nomiG));
    localStorage.setItem('nomiS', JSON.stringify(nomiS));
}

// 4. Funzioni punti (rimangono quasi uguali)
function modificaPunti(numGiocatore, operazione) {
    let valore = parseInt(document.getElementById('val' + numGiocatore).value) || 0;
    punteggi[numGiocatore - 1] += (operazione === 'piu' ? valore : -valore);
    document.getElementById('punti' + numGiocatore).innerText = punteggi[numGiocatore - 1];
    localStorage.setItem('puntiG', JSON.stringify(punteggi));
}

function modificaPuntiSpettatore(num) {
    let valore = parseInt(document.getElementById('valS' + num).value) || 0;
    puntiSpettatori[num-1] += valore;
    document.getElementById('puntiS' + num).innerText = puntiSpettatori[num-1];
    localStorage.setItem('puntiS', JSON.stringify(puntiSpettatori));
}

</script>
