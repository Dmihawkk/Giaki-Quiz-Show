    <script>
       // 1. Carica punti E nomi salvati (o array vuoti se è la prima volta)
let punteggi = JSON.parse(localStorage.getItem('puntiG')) || [0, 0, 0, 0];
let puntiSpettatori = JSON.parse(localStorage.getItem('puntiS')) || [0, 0, 0, 0, 0, 0, 0];
let nomiG = JSON.parse(localStorage.getItem('nomiG')) || ["", "", "", ""];
let nomiS = JSON.parse(localStorage.getItem('nomiS')) || ["", "", "", "", "", "", ""];

// 2. Carica tutto all'avvio
window.onload = function() {
    // Carica dati Giocatori
    for(let i=1; i<=4; i++) {
        if(document.getElementById('punti' + i)) document.getElementById('punti' + i).innerText = punteggi[i-1];
        if(document.getElementById('nomeG' + i)) document.getElementById('nomeG' + i).value = nomiG[i-1];
    }
    // Carica dati Spettatori
    for(let i=1; i<=7; i++) {
        if(document.getElementById('puntiS' + i)) document.getElementById('puntiS' + i).innerText = puntiSpettatori[i-1];
        if(document.getElementById('nomeS' + i)) document.getElementById('nomeS' + i).value = nomiS[i-1];
    }
};

// 3. Funzione per salvare i nomi (chiamata ogni volta che scrivi)
function salvaNomi() {
    for(let i=1; i<=4; i++) {
        nomiG[i-1] = document.getElementById('nomeG' + i).value;
    }
    for(let i=1; i<=7; i++) {
        nomiS[i-1] = document.getElementById('nomeS' + i).value;
    }
    localStorage.setItem('nomiG', JSON.stringify(nomiG));
    localStorage.setItem('nomiS', JSON.stringify(nomiS));
}

// 4. Funzioni punti (rimangono quasi uguali)
function modificaPunti(numGiocatore, operazione) {
    let valore = parseInt(document.getElementById('val' + numGiocatore).value) || 0;
    punteggi[numGiocatore - 1] += (operazione === 'piu' ? valore : -valore);
    document.getElementById('punti' + numGiocatore).innerText = punteggi[numGiocatore - 1];
    localStorage.setItem('puntiG', JSON.stringify(punteggi));
}

function modificaPuntiSpettatore(num) {
    let valore = parseInt(document.getElementById('valS' + num).value) || 0;
    puntiSpettatori[num-1] += valore;
    document.getElementById('puntiS' + num).innerText = puntiSpettatori[num-1];
    localStorage.setItem('puntiS', JSON.stringify(puntiSpettatori));
}

        // LOGICA QUIZ
        let indiziAttuali = [];
        let indiceIndizio = 0;
        let slotAttivo = null;

        function apriQuizPersonaggio(elemento, listaImmagini, nomeSoluzione) {
            slotAttivo = elemento;
            indiziAttuali = listaImmagini;
            indiceIndizio = 0;
            const box = document.getElementById('contenitore-indizi');
            box.innerHTML = ""; 
            aggiungiImmagine(indiziAttuali[0]);
            document.getElementById('nome-personaggio').innerText = nomeSoluzione;
            document.getElementById('nome-personaggio').style.display = 'none';
            document.getElementById('btn-next').disabled = false;
            document.getElementById('btn-next').style.opacity = "1";
            document.getElementById('overlay-personaggio').style.display = 'flex';
        }

        function aggiungiImmagine(src) {
            const img = document.createElement('img');
            img.src = src;
            document.getElementById('contenitore-indizi').appendChild(img);
        }

        function prossimoIndizio() {
            if (indiceIndizio < indiziAttuali.length - 1) {
                indiceIndizio++;
                aggiungiImmagine(indiziAttuali[indiceIndizio]);
            }
            if (indiceIndizio === indiziAttuali.length - 1) {
                document.getElementById('btn-next').disabled = true;
                document.getElementById('btn-next').style.opacity = "0.3";
            }
        }

        function chiudiQuizPersonaggio() {
            document.getElementById('overlay-personaggio').style.display = 'none';
            if (slotAttivo) {
                slotAttivo.style.filter = "grayscale(100%) brightness(20%)";
                slotAttivo.style.pointerEvents = "none";
                slotAttivo.style.borderColor = "#333";
            }
        }
    </script>
