// --- 2. GENERAZIONE GRIGLIA ---
const tabellone = document.getElementById('tabellone');
const totaleCaselle = 100;
const colonne = 10;

if (tabellone) {
    for (let i = 0; i < totaleCaselle; i++) {
        let riga = Math.floor(i / colonne);
        let colPos = (riga % 2 === 0) ? (i % colonne) + 1 : colonne - (i % colonne);

// --- 4. FUNZIONI LOGICHE, MOVIMENTO E SALVATAGGIO ---
function salvaNomi() {
    for(let i=1; i<=4; i++) {
        let el = document.getElementById('nomeG' + i);
        if(el) nomiG[i-1] = el.value;
    }
    for(let i=1; i<=7; i++) {
        let el = document.getElementById('nomeS' + i);
        if(el) nomiS[i-1] = el.value;
    }
    localStorage.setItem('nomiG', JSON.stringify(nomiG));
    localStorage.setItem('nomiS', JSON.stringify(nomiS));
}

function muoviGiocatore(player, passi) {
    let nuovaPos = posizioniAttuali[player] + passi;
    if (nuovaPos > 100) nuovaPos = 100;
    if (nuovaPos < 1) nuovaPos = 1;
    
    posizioniAttuali[player] = nuovaPos;
    localStorage.setItem('posTabellone', JSON.stringify(posizioniAttuali));
    disegnaPedina(player, nuovaPos);
}

function disegnaPedina(player, casellaNum) {
    const container = document.getElementById(`pedine-c-${casellaNum}`);
    if (container) {
        const vecchiaP = document.getElementById(`pedina-player-${player}`);
        if (vecchiaP) vecchiaP.remove();

        const div = document.createElement('div');
        div.className = `pedina p${player}`;
        div.id = `pedina-player-${player}`;
        
        div.style.width = '1.7vw';
        div.style.height = '1.7vw';
        div.style.minWidth = '22px';
        div.style.minHeight = '22px';
        div.style.backgroundColor = coloriPedine[player];
        div.style.borderRadius = '50%';
        div.style.border = '3px solid black'; 
        div.style.display = 'inline-block';
        div.style.margin = '1px';
        div.style.boxShadow = '0 0 5px rgba(0,0,0,0.7)';
        
        container.appendChild(div);
    }
}

// --- 5. INIZIALIZZAZIONE UNIFICATA ---
window.onload = function() {
    // Carica dati Giocatori (Punti, Nomi e Pedine)
    for(let i=1; i<=4; i++) {
        if(document.getElementById('punti' + i)) document.getElementById('punti' + i).innerText = punteggi[i-1];
        if(document.getElementById('nomeG' + i)) document.getElementById('nomeG' + i).value = nomiG[i-1];
        disegnaPedina(i, posizioniAttuali[i]);
    }
    // Carica dati Spettatori
    for(let i=1; i<=7; i++) {
        if(document.getElementById('puntiS' + i)) document.getElementById('puntiS' + i).innerText = puntiSpettatori[i-1];
        if(document.getElementById('nomeS' + i)) document.getElementById('nomeS' + i).value = nomiS[i-1];
    }
};

// --- 6. EXTRA (PUNTI, DADI, QUIZ) ---
function modificaPunti(numGiocatore, operazione) {
    let valore = parseInt(document.getElementById('val' + numGiocatore).value) || 0;
    punteggi[numGiocatore - 1] += (operazione === 'piu' ? valore : -valore);
    document.getElementById('punti' + numGiocatore).innerText = punteggi[numGiocatore - 1];
    localStorage.setItem('puntiG', JSON.stringify(punteggi));
}

function modificaPuntiSpettatore(num) {
    let valore = parseInt(document.getElementById('valS' + num).value) || 0;
    puntiSpettatori[num-1] += valore;
    document.getElementById('puntiS' + num).innerText = puntiSpettatori[num-1];
    localStorage.setItem('puntiS', JSON.stringify(puntiSpettatori));
}

function lanciaDado(facce, elemento) {
    // Gestione oscuramento: se clicco, aggiunge o toglie la classe 'oscurato'
    if (elemento) {
        elemento.classList.toggle('oscurato');
        
        // Se il dado è appena stato oscurato, non lanciare il numero (opzionale)
        if (elemento.classList.contains('oscurato')) {
            return; 
        }
    }

    const display = document.getElementById('risultato-dado');
    if (!display) return;
    
    display.innerText = "...";
    setTimeout(() => {
        const risultato = Math.floor(Math.random() * facce) + 1;
        display.innerText = risultato;
        display.style.color = (risultato === facce) ? "#00ff00" : (risultato === 1) ? "#ff0000" : "#ffcc00";
    }, 150);
}

let audioCorrente = null; 

function apriDomanda(elemento, numero, categoria) {
    if (elemento) elemento.classList.add('visitata');

    let dati = databaseDomande[numero] || { 
        q: "Domanda n. " + numero, 
        a: "Risposta non inserita",
        img: null,
        audio: null
    };

    document.getElementById('categoria-titolo').innerText = categoria;
    const txtDomanda = document.getElementById('testo-domanda');
    txtDomanda.innerText = dati.q;

    // Reset elementi
    const vecchioPlayer = document.getElementById('audio-player-container');
    if (vecchioPlayer) vecchioPlayer.remove();
    const imgElement = document.getElementById('immagine-domanda');
    if (imgElement) imgElement.style.display = 'none';

    // Logica SUONO
    if (categoria.toUpperCase() === "SUONO") {
        const percorsoAudio = dati.audio || `audio/${numero}.mp3`;
        const audioContainer = document.createElement('div');
        audioContainer.id = 'audio-player-container';
        audioContainer.innerHTML = `<audio id="quiz-audio" controls autoplay style="width:100%; margin-top:20px;"><source src="${percorsoAudio}" type="audio/mpeg"></audio>`;
        txtDomanda.after(audioContainer);
        audioCorrente = document.getElementById('quiz-audio');
    } 
    // Logica ALTRE (Immagini)
    else {
        if (imgElement) {
            imgElement.src = dati.img || `immagini/${numero}.jpg`;
            imgElement.style.display = 'block';
            imgElement.onerror = function() { this.style.display = 'none'; };
        }
    }

    const areaRisposta = document.getElementById('area-risposta');
    areaRisposta.innerText = dati.a;
    areaRisposta.style.display = 'none';
    document.getElementById('quiz-overlay').style.display = 'flex';
}

function mostraRisposta() {
    document.getElementById('area-risposta').style.display = 'block';
}

function chiudiQuiz() {
    document.getElementById('quiz-overlay').style.display = 'none';
    if (audioCorrente) {
        audioCorrente.pause();
        audioCorrente.currentTime = 0;
    }
}
